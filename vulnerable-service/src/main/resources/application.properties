# VulnerableApp Dependent Service Configuration
server.port=9091
server.servlet.context-path=/DependentService

# VulnerableApp backend URL for cross-service calls (Pattern 2)
vulnerableapp.base-url=http://localhost:9090/VulnerableApp

# H2 Database — uses same credentials as VulnerableApp (Pattern 4)
spring.datasource.url=jdbc:h2:mem:dependentdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=hacker

# H2 Console enabled with known credentials
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

# Schema initialization
spring.datasource.initialization-mode=always
spring.datasource.schema=classpath:schema.sql
spring.datasource.data=classpath:data.sql

# File upload — no size limit (Pattern: resource consumption)
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1

# Logging — uses Log4j2 from shared library transitively (Pattern 5)
logging.level.org.sasanlabs=DEBUG
